<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API Sniffer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 520px;
      max-height: 600px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #f5f6f7;
    }
    .header {
      background: #1a73e8;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 500;
    }
    .header .count {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    .toolbar {
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 12px;
      border: 1px solid #dadce0;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .toolbar button:hover {
      background: #f1f3f4;
    }
    .toolbar button.primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .toolbar button.primary:hover {
      background: #1557b0;
    }
    .toolbar button.danger {
      color: #d93025;
      border-color: #fad2cf;
      background: #fce8e6;
    }
    .toolbar button.danger:hover {
      background: #fad2cf;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 120px;
      padding: 6px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
    }
    .list {
      max-height: 420px;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .record {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-top: 8px;
      overflow: hidden;
    }
    .record-header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .record-header:hover {
      background: #f8f9fa;
    }
    .method {
      font-weight: 600;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      min-width: 44px;
      text-align: center;
    }
    .method.GET { background: #e8f5e9; color: #2e7d32; }
    .method.POST { background: #e3f2fd; color: #1565c0; }
    .method.PUT { background: #fff3e0; color: #ef6c00; }
    .method.DELETE { background: #ffebee; color: #c62828; }
    .method.PATCH { background: #f3e5f5; color: #6a1b9a; }
    .method.OTHER { background: #eceff1; color: #37474f; }
    .status {
      font-weight: 600;
      font-size: 11px;
      min-width: 36px;
      text-align: center;
    }
    .status.ok { color: #2e7d32; }
    .status.err { color: #c62828; }
    .url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #333;
    }
    .meta {
      color: #888;
      font-size: 11px;
      white-space: nowrap;
    }
    .del-btn {
      color: #ccc;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      user-select: none;
      transition: color 0.15s;
    }
    .del-btn:hover {
      color: #c62828;
    }
    .replay-btn {
      color: #1a73e8;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 2px 8px;
      border: 1px solid #c6dafc;
      border-radius: 3px;
      background: #e8f0fe;
      user-select: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .replay-btn:hover {
      background: #d2e3fc;
      border-color: #1a73e8;
    }
    .replay-btn.loading {
      opacity: 0.6;
      pointer-events: none;
    }
    .replay-editor {
      margin-top: 6px;
    }
    .replay-editor textarea {
      width: 100%;
      min-height: 80px;
      background: #263238;
      color: #ffcc80;
      border: 1px solid #455a64;
      border-radius: 4px;
      padding: 8px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      resize: vertical;
    }
    .replay-editor .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .replay-send-btn {
      padding: 4px 14px;
      border: 1px solid #1a73e8;
      background: #1a73e8;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .replay-send-btn:hover {
      background: #1557b0;
    }
    .replay-send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .replay-cancel-btn {
      padding: 4px 14px;
      border: 1px solid #dadce0;
      background: #fff;
      color: #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .replay-cancel-btn:hover {
      background: #f1f3f4;
    }
    .replay-result {
      margin-top: 10px;
      border: 1px solid #c6dafc;
      border-radius: 4px;
      background: #f8fbff;
      padding: 10px;
    }
    .replay-result .replay-status {
      font-weight: 600;
      font-size: 13px;
    }
    .replay-result .replay-status.ok { color: #2e7d32; }
    .replay-result .replay-status.err { color: #c62828; }
    .replay-result .replay-meta {
      color: #888;
      font-size: 11px;
      margin-left: 8px;
    }
    .replay-result .section {
      margin-top: 8px;
    }
    .record-body {
      display: none;
      border-top: 1px solid #e0e0e0;
      padding: 10px 12px;
      background: #fafafa;
    }
    .record-body.open {
      display: block;
    }
    .section {
      margin-bottom: 10px;
    }
    .section-title {
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .copy-btn {
      font-size: 10px;
      padding: 1px 6px;
      border: 1px solid #dadce0;
      border-radius: 3px;
      background: #fff;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-btn:hover {
      background: #e8f0fe;
      color: #1a73e8;
      border-color: #1a73e8;
    }
    .code {
      background: #263238;
      color: #aed581;
      padding: 8px;
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      overflow-x: auto;
      max-height: 200px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #888;
    }
    .debug-log {
      padding: 8px 16px;
      background: #fffbe6;
      color: #d46b08;
      font-size: 11px;
      border-bottom: 1px solid #ffd8bf;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .filter-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .filter-chips .chip {
      padding: 3px 8px;
      border: 1px solid #dadce0;
      border-radius: 12px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .filter-chips .chip:hover {
      background: #e8f0fe;
      border-color: #1a73e8;
    }
    .filter-chips .chip.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
    }
    .toggle-label {
      color: #333;
      user-select: none;
      cursor: pointer;
    }
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      display: none;
    }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #1a73e8;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <div class="debug-log" id="debugLog"></div>

  <div class="header">
    <h1>API Sniffer</h1>
    <span class="count" id="count">0 条记录</span>
  </div>

  <div class="toolbar">
    <button id="btnRefresh">刷新</button>
    <button id="btnPause" style="background:#fff3e0;color:#ef6c00;border-color:#ffe0b2;">暂停</button>
    <button id="btnClear" class="danger">清空</button>
    <div class="filter-row">
      <input type="text" id="filterUrl" placeholder="过滤 URL...">
      <button id="btnJson" class="primary">导出 JSON</button>
      <button id="btnHar">导出 HAR</button>
      <button id="btnPostman">导出 Postman</button>
      <button id="btnCsv">导出 CSV</button>
      <button id="btnSummary">导出摘要</button>
    </div>
  </div>

  <div class="toggle-row">
    <label class="toggle-switch">
      <input type="checkbox" id="toggleDomainOnly" checked>
      <span class="toggle-slider"></span>
    </label>
    <label class="toggle-label" for="toggleDomainOnly">仅监控当前域名</label>
  </div>

  <div class="toggle-row">
    <span style="color:#888;white-space:nowrap;">方法:</span>
    <div class="filter-chips" id="methodChips">
      <span class="chip active" data-val="">全部</span>
      <span class="chip" data-val="GET">GET</span>
      <span class="chip" data-val="POST">POST</span>
      <span class="chip" data-val="PUT">PUT</span>
      <span class="chip" data-val="DELETE">DELETE</span>
      <span class="chip" data-val="PATCH">PATCH</span>
    </div>
  </div>

  <div class="toggle-row">
    <span style="color:#888;white-space:nowrap;">状态:</span>
    <div class="filter-chips" id="statusChips">
      <span class="chip active" data-val="">全部</span>
      <span class="chip" data-val="2xx">2xx</span>
      <span class="chip" data-val="3xx">3xx</span>
      <span class="chip" data-val="4xx">4xx</span>
      <span class="chip" data-val="5xx">5xx</span>
      <span class="chip" data-val="error">错误</span>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty">暂无捕获到的请求</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
